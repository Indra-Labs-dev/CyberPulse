name: frontend
description: "CyberPulse — Centre de Veille et d'Analyse en Cybersécurité (Desktop)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1

  # Charts
  syncfusion_flutter_charts: ^27.2.5

  # Desktop integration
  flutter_local_notifications: ^18.0.1
  system_tray: ^2.0.3
  window_manager: ^0.4.3

  # Content rendering
  flutter_markdown: ^0.7.4+3

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  open_filex: ^4.6.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
